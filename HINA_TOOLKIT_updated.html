<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HINA TOOLKIT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f9f9f9;
    --shadow-dark: #d1d9e6;
    --shadow-light: #ffffff;
    --primary: #ff6b9d;
    --primary-dark: #e0547f;
    --secondary: #6c63ff;
    --accent: #00d4ff;
    --green: #00c896;
    --red: #ff4757;
    --text: #4a5568;
    --text-light: #718096;
    --text-dark: #2d3748;
    --neu-flat: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
    --neu-pressed: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
    --neu-hover: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
    --neu-deep: 16px 16px 32px var(--shadow-dark), -16px -16px 32px var(--shadow-light);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── KEY LOGIN SCREEN ─────────────────────────── */
  #keyLoginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: #ffffff;
  }

  .key-login-wrap {
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.6s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .key-login-card {
    background: #ffffff;
    border-radius: 36px;
    padding: 52px 44px;
    box-shadow: 16px 16px 40px #d1d9e6, -8px -8px 24px #ffffff;
    text-align: center;
    border: 1px solid #e8e8e8;
  }

  .kl-logo {
    width: 120px; height: 120px;
    border-radius: 24px;
    background: #f0f0f0;
    box-shadow: 6px 6px 14px #d1d9e6, -4px -4px 10px #ffffff;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    margin: 0 auto 28px;
    animation: pulseDark 3s ease-in-out infinite;
    transition: transform 0.3s ease;
  }

  @keyframes pulseDark {
    0%,100% { 
      box-shadow: 6px 6px 14px #d1d9e6, -4px -4px 10px #ffffff;
      transform: translateY(0px) scale(1);
    }
    25% { 
      transform: translateY(-6px) scale(1.03);
      box-shadow: 8px 18px 28px #c0c8d8, -4px -4px 12px #ffffff;
    }
    50% { 
      box-shadow: 10px 22px 32px #b8c0d0, -6px -6px 16px #ffffff;
      transform: translateY(-10px) scale(1.05);
    }
    75% {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 8px 18px 28px #c0c8d8, -4px -4px 12px #ffffff;
    }
  }

  .kl-title {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    color: #2d3748;
    -webkit-text-fill-color: #2d3748;
    letter-spacing: 4px;
    margin-bottom: 6px;
  }

  .kl-sub {
    font-size: 12px;
    color: #718096;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 300;
    margin-bottom: 36px;
  }

  .kl-input-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .kl-input {
    width: 100%;
    background: #f0f0f3;
    border: 1px solid #e0e0e0;
    border-radius: 16px;
    padding: 16px 20px 16px 52px;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    color: #2d3748;
    box-shadow: inset 4px 4px 10px #d1d9e6, inset -2px -2px 6px #ffffff;
    outline: none;
    letter-spacing: 2px;
    text-align: center;
    text-transform: uppercase;
  }

  .kl-input::placeholder {
    color: #a0aec0;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 400;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: none;
  }

  .kl-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
  }

  .kl-btn {
    width: 100%;
    background: #f9f9f9;
    border: 1px solid #e0e0e0;
    border-radius: 16px;
    padding: 16px;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 6px 6px 14px #d1d9e6, -3px -3px 8px #ffffff;
    color: #4a5568;
    transition: all 0.2s;
    margin-bottom: 16px;
  }

  .kl-btn:hover { box-shadow: 10px 10px 22px #c8d0e0, -5px -5px 12px #ffffff; transform: translateY(-2px); }
  .kl-btn:active { box-shadow: inset 4px 4px 10px #d1d9e6; transform: translateY(0); }

  .kl-error {
    background: #1a0a0a;
    border: 1px solid #3a1a1a;
    border-radius: 12px;
    padding: 12px;
    color: var(--red);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 12px;
    display: none;
    animation: shake 0.3s ease;
  }

  .kl-success {
    color: var(--green);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 12px;
    display: none;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .kl-plan-info {
    background: #f5f5f5;
    border: 1px solid #e0e0e0;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 20px;
    display: none;
  }

  .kl-plan-info-title {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: #a0aec0;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .kl-plan-badge {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .kl-expiry {
    font-size: 12px;
    color: #a0aec0;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .kl-separator {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 12px 0;
    color: #a0aec0;
    font-size: 12px;
    letter-spacing: 2px;
  }

  .kl-separator::before, .kl-separator::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #e0e0e0;
  }

  /* ── WHATSAPP CONTACT ───────────────────────────── */
  .kl-whatsapp-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    background: #0d1a0d;
    border: 1px solid #1a3a1a;
    border-radius: 16px;
    padding: 14px 20px;
    margin-top: 16px;
    cursor: pointer;
    box-shadow: 4px 4px 12px #000000;
    text-decoration: none;
    transition: all 0.2s;
    color: #25D366;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1.5px;
  }

  .kl-whatsapp-btn:hover {
    box-shadow: 8px 8px 20px #000000;
    transform: translateY(-2px);
    color: #1ebe5d;
  }

  .kl-whatsapp-btn:active {
    box-shadow: inset 2px 2px 8px #000000;
    transform: translateY(0);
  }

  .kl-whatsapp-icon {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }

  .kl-contact-label {
    font-size: 11px;
    color: #a0aec0;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 10px;
    margin-bottom: 2px;
  }

  /* ── MAIN TOOLKIT ─────────────────────────────── */
  #toolkitApp { display: none; }

  /* HEADER */
  .header {
    background: var(--bg);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 20px var(--shadow-dark), 0 -2px 10px var(--shadow-light);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { display: flex; align-items: center; gap: 14px; }

  .logo-icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    background: var(--bg);
    box-shadow: var(--neu-flat);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    animation: pulse-icon 2.5s ease-in-out infinite;
  }

  @keyframes pulse-icon {
    0%,100% { box-shadow: var(--neu-flat); }
    50% { box-shadow: var(--neu-hover); }
  }

  .logo-text {
    font-family: 'Orbitron', monospace;
    font-size: 24px;
    font-weight: 900;
    color: #000000;
    -webkit-text-fill-color: #000000;
    letter-spacing: 3px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 300;
  }

  .header-right {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .stat-badge {
    background: var(--bg);
    border-radius: 12px;
    padding: 8px 16px;
    box-shadow: var(--neu-flat);
    font-size: 12px;
    color: var(--text-light);
    font-weight: 600;
    letter-spacing: 1px;
  }

  .stat-badge span {
    color: var(--primary);
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
  }

  .plan-badge-header {
    background: var(--bg);
    border-radius: 12px;
    padding: 8px 16px;
    box-shadow: var(--neu-pressed);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .header-btn {
    background: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 10px 20px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: var(--neu-flat);
    color: var(--secondary);
    transition: all 0.2s;
  }

  .header-btn:hover { box-shadow: var(--neu-hover); transform: translateY(-2px); }
  .header-btn:active { box-shadow: var(--neu-pressed); transform: translateY(0); }

  .header-btn.danger { color: var(--red); }

  /* MAIN */
  .main {
    padding: 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* SEARCH */
  .search-wrap { margin-bottom: 28px; position: relative; }

  .search-input {
    width: 100%;
    background: var(--bg);
    border: none;
    border-radius: 16px;
    padding: 16px 20px 16px 56px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-dark);
    box-shadow: var(--neu-pressed);
    outline: none;
    letter-spacing: 1px;
  }

  .search-input::placeholder { color: var(--text-light); font-weight: 400; }

  .search-icon {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    color: var(--primary);
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .tab {
    background: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 9px 20px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: var(--neu-flat);
    color: var(--text-light);
    transition: all 0.2s;
  }

  .tab:hover { box-shadow: var(--neu-hover); color: var(--text-dark); }
  .tab.active { box-shadow: var(--neu-pressed); color: var(--primary); }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 26px;
  }

  /* TOOL CARD */
  .tool-card {
    background: var(--bg);
    border-radius: 24px;
    padding: 26px;
    box-shadow: var(--neu-flat);
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .tool-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 24px 24px 0 0;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .tool-card:hover { box-shadow: var(--neu-hover); transform: translateY(-4px); }
  .tool-card:hover::before { opacity: 1; }
  .tool-card.pinned::before { opacity: 1; }

  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .tool-icon-wrap {
    width: 54px; height: 54px;
    border-radius: 16px;
    background: var(--bg);
    box-shadow: var(--neu-flat);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    transition: box-shadow 0.2s;
  }

  .tool-card:hover .tool-icon-wrap { box-shadow: var(--neu-pressed); }

  .card-actions { display: flex; gap: 8px; }

  .icon-btn {
    width: 34px; height: 34px;
    border-radius: 10px;
    border: none;
    background: var(--bg);
    box-shadow: var(--neu-flat);
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    color: var(--text-light);
  }

  .icon-btn:hover { box-shadow: var(--neu-hover); color: var(--primary); }
  .icon-btn:active { box-shadow: var(--neu-pressed); }
  .icon-btn.pinned { color: var(--primary); box-shadow: var(--neu-pressed); }

  .tool-tag {
    display: inline-block;
    background: var(--bg);
    border-radius: 8px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    box-shadow: var(--neu-flat);
    color: var(--secondary);
    margin-bottom: 14px;
  }

  .tool-name {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-dark);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .tool-desc {
    font-size: 13px;
    color: var(--text-light);
    line-height: 1.5;
    margin-bottom: 18px;
  }

  .tool-input {
    width: 100%;
    background: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 10px 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    color: var(--text-dark);
    box-shadow: var(--neu-pressed);
    outline: none;
    margin-bottom: 10px;
    resize: vertical;
  }

  .tool-input::placeholder { color: var(--text-light); }

  .run-btn {
    width: 100%;
    background: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 11px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: var(--neu-flat);
    color: var(--primary);
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }

  .run-btn:hover { box-shadow: var(--neu-hover); color: var(--primary-dark); }
  .run-btn:active { box-shadow: var(--neu-pressed); }

  .output-box {
    margin-top: 12px;
    background: var(--bg);
    border-radius: 12px;
    padding: 12px 14px;
    box-shadow: var(--neu-pressed);
    font-size: 13px;
    color: var(--text-dark);
    display: none;
    line-height: 1.6;
    word-break: break-all;
  }

  .output-box.show { display: block; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .copy-output {
    float: right;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 13px;
    color: var(--primary);
    font-family: 'Rajdhani';
    font-weight: 700;
    letter-spacing: 1px;
  }

  /* ADD TOOL MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(224,229,236,0.85);
    backdrop-filter: blur(10px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg);
    border-radius: 28px;
    padding: 36px;
    width: 100%;
    max-width: 520px;
    box-shadow: var(--neu-deep);
    animation: slideUp 0.3s ease;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 24px;
    letter-spacing: 2px;
  }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 8px;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 12px 16px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    color: var(--text-dark);
    box-shadow: var(--neu-pressed);
    outline: none;
    font-weight: 600;
  }

  .form-textarea { resize: vertical; min-height: 80px; }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 8px;
    margin-top: 8px;
  }

  .emoji-opt {
    background: var(--bg);
    border: none;
    border-radius: 10px;
    padding: 7px;
    font-size: 17px;
    cursor: pointer;
    box-shadow: var(--neu-flat);
    transition: all 0.15s;
    text-align: center;
  }

  .emoji-opt:hover { box-shadow: var(--neu-hover); transform: scale(1.1); }
  .emoji-opt.selected { box-shadow: var(--neu-pressed); }

  .modal-btns { display: flex; gap: 12px; margin-top: 24px; }

  .modal-btn-cancel {
    flex: 1;
    background: var(--bg);
    border: none;
    border-radius: 14px;
    padding: 13px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: var(--neu-flat);
    color: var(--text-light);
    transition: all 0.2s;
  }

  .modal-btn-cancel:hover { box-shadow: var(--neu-hover); }

  .modal-btn-add {
    flex: 2;
    background: var(--bg);
    border: none;
    border-radius: 14px;
    padding: 13px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: var(--neu-flat);
    color: var(--primary);
    transition: all 0.2s;
  }

  .modal-btn-add:hover { box-shadow: var(--neu-hover); }
  .modal-btn-add:active { box-shadow: var(--neu-pressed); }

  /* SECTION LABEL */
  .section-label {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-light);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--shadow-dark), transparent);
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--bg);
    border-radius: 14px;
    padding: 14px 24px;
    box-shadow: var(--neu-deep);
    font-size: 14px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 1px;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-light);
  }

  .empty-icon { font-size: 60px; margin-bottom: 16px; opacity: 0.5; }
  .empty-text { font-size: 18px; font-weight: 600; letter-spacing: 1px; }

  @media (max-width: 600px) {
    .header { padding: 14px 18px; }
    .main { padding: 18px; }
    .grid { grid-template-columns: 1fr; gap: 18px; }
    .logo-text { font-size: 18px; }
    .header-right .stat-badge, .header-right .plan-badge-header { display: none; }
  }

  /* ── WELCOME SCREEN ─────────────────────────── */
  #welcomeScreen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 9999;
    overflow: hidden;
  }

  #welcomeScreen.show {
    display: flex;
    animation: fadeInWelcome 0.6s ease;
  }

  @keyframes fadeInWelcome {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .welcome-text {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    text-align: center;
    line-height: 1.4;
    z-index: 2;
    animation: welcomePulse 1.5s ease-in-out infinite;
  }

  .welcome-text .w-word {
    color: #000;
  }

  .welcome-text .w-heart {
    color: #ff0000;
    font-size: 36px;
  }

  .welcome-text .w-toolkit {
    background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  @keyframes welcomePulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  /* Falling particles */
  .particle {
    position: absolute;
    pointer-events: none;
    animation: fall linear infinite;
    z-index: 1;
    user-select: none;
  }

  @keyframes fall {
    0% { transform: translateY(-40px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0.4; }
  }

  /* ── NOTIFICATION BANNER ─────────────────────────── */
  .notif-banner {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 9999;
    padding: 12px 20px 12px 20px;
    background: var(--bg);
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    align-items: center;
    gap: 14px;
    animation: nbSlide .4s ease;
  }
  .notif-banner.show { display: flex; }
  @keyframes nbSlide {
    from { transform: translateY(-100%); }
    to { transform: translateY(0); }
  }
  .nb-icon { font-size: 24px; flex-shrink: 0; }
  .nb-body { flex: 1; }
  .nb-title { font-family: 'Orbitron', monospace; font-size: 12px; font-weight: 700; color: var(--text-dark); letter-spacing: 1px; }
  .nb-msg { font-size: 13px; color: var(--text-light); line-height: 1.4; margin-top: 2px; }
  .nb-close { background: var(--bg); border: none; border-radius: 10px; padding: 6px 12px; cursor: pointer; box-shadow: var(--neu-flat); font-size: 16px; color: var(--text-light); transition: all .2s; flex-shrink: 0; }
  .nb-close:hover { box-shadow: var(--neu-hover); color: var(--primary); }

  /* ── EXTERNAL TOOL IFRAME OVERLAY ─────────────────── */
  .ext-overlay {
    position: fixed;
    inset: 0;
    z-index: 9990;
    background: var(--bg);
    display: none;
    flex-direction: column;
    animation: su .3s ease;
  }
  .ext-overlay.open { display: flex; }
  .ext-topbar {
    background: var(--bg);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 4px 16px var(--neu-shadow-dark, #a3b1c6);
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }
  .ext-back-btn {
    background: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 10px 18px;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: var(--neu-flat);
    color: var(--primary);
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .ext-back-btn:hover { box-shadow: var(--neu-hover); }
  .ext-back-btn:active { box-shadow: var(--neu-pressed); }
  .ext-tool-name {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
    flex: 1;
  }
  .ext-open-btn {
    background: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 10px 16px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: var(--neu-flat);
    color: var(--accent);
    transition: all .2s;
    flex-shrink: 0;
  }
  .ext-open-btn:hover { box-shadow: var(--neu-hover); }
  .ext-iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: #fff;
  }
  .ext-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    background: var(--bg);
    z-index: 1;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: var(--text-light);
    letter-spacing: 2px;
  }
  .ext-spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--neu-shadow-dark, #a3b1c6);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* External tool card badge */
  .ext-badge {
    display: inline-block;
    background: var(--bg);
    border-radius: 8px;
    padding: 2px 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    box-shadow: var(--neu-flat);
    margin-top: 4px;
  }

</style>
</head>

async function getStoredKeys() {
  try {
    const snap = await get(ref(db, 'hina_keys'));
    return snap.exists() ? Object.values(snap.val()).filter(k=>k&&k.key) : [];
  } catch(e) { return []; }
}

function formatKeyInput(el) {
  let val = el.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  let parts = [];
  if (val.length > 0) { parts.push(val.slice(0, 4)); val = val.slice(4); }
  let sc = 0;
  while (val.length > 0 && sc < 3) { parts.push(val.slice(0, 5)); val = val.slice(5); sc++; }
  el.value = parts.join('-');
}

function getPlanLabel(plan) {
  return { '1day':'1 Day', '7day':'7 Days', '30day':'30 Days', 'full':'♾️ Full Access' }[plan] || plan;
}

async function verifyKey() {
  let rawInput = document.getElementById('keyInput').value.trim().toUpperCase();
  let clean = rawInput.replace(/[^A-Z0-9]/g, '');
  let input = clean;
  if (clean.length >= 4) {
    let seg1 = clean.slice(0, 4);
    let rest = clean.slice(4);
    let segs = [];
    for (let i = 0; i < rest.length; i += 5) segs.push(rest.slice(i, i + 5));
    input = [seg1, ...segs].join('-');
  }

  const errEl = document.getElementById('klError');
  const succEl = document.getElementById('klSuccess');
  const planInfo = document.getElementById('planInfo');
  errEl.style.display = 'none';
  succEl.style.display = 'none';
  planInfo.style.display = 'none';

  if (!input) {
    errEl.textContent = '⚠️ Please enter your license key!';
    errEl.style.display = 'block';
    return;
  }

  const keys = await getStoredKeys();
  const safeInput = input.replace(/-/g, '_');
  // Match by key field
  const keyObj = keys.find(k => k.key === input || k.key.replace(/-/g,'_') === safeInput);

  if (!keyObj) {
    errEl.textContent = '❌ Invalid key! Contact admin.';
    errEl.style.display = 'block';
    errEl.style.animation = 'none';
    setTimeout(() => errEl.style.animation = '', 10);
    return;
  }

  // Check expiry
  if (keyObj.plan !== 'full' && keyObj.expires && new Date() > new Date(keyObj.expires)) {
    // Update to expired in Firebase
    const safeKey = keyObj.key.replace(/-/g, '_');
    try { await update(ref(db), { ['hina_keys/' + safeKey + '/status']: 'expired' }); } catch(e){}
    errEl.textContent = '⏰ This key has expired! Contact admin.';
    errEl.style.display = 'block';
    return;
  }

  if (keyObj.status === 'expired') {
    errEl.textContent = '⏰ Key expired! Contact admin.';
    errEl.style.display = 'block';
    return;
  }

  // ── ONE-TIME KEY: if already used by someone else, BLOCK ──────
  if (keyObj.status === 'used') {
    // Check if THIS device used it (by saved session)
    const sess = sessionStorage.getItem('hina_session');
    if (sess) {
      try {
        const s = JSON.parse(sess);
        if (s.key === keyObj.key) {
          // Same device — allow (session resume)
        } else {
          errEl.textContent = '🚫 This key is already in use! Each key works for 1 person only.';
          errEl.style.display = 'block';
          return;
        }
      } catch(e) {
        errEl.textContent = '🚫 This key is already in use! Each key works for 1 person only.';
        errEl.style.display = 'block';
        return;
      }
    } else {
      errEl.textContent = '🚫 This key is already in use! Each key works for 1 person only.';
      errEl.style.display = 'block';
      return;
    }
  }

  // Mark as used + store who used it
  const safeKey = keyObj.key.replace(/-/g, '_');
  const usedAt = new Date().toISOString();
  try {
    await update(ref(db), {
      ['hina_keys/' + safeKey + '/status']: 'used',
      ['hina_keys/' + safeKey + '/used_at']: usedAt
    });
  } catch(e) { console.error('mark used error:', e); }

  // Show plan info
  const expText = keyObj.plan === 'full' ? 'Lifetime Access' :
    keyObj.expires ? 'Expires: ' + new Date(keyObj.expires).toLocaleDateString('en-PK') : '';
  document.getElementById('planBadge').textContent = getPlanLabel(keyObj.plan);
  document.getElementById('planExpiry').textContent = expText;
  planInfo.style.display = 'block';
  succEl.style.display = 'block';

  // Store session
  sessionStorage.setItem('hina_session', JSON.stringify({
    key: keyObj.key,
    plan: keyObj.plan,
    expires: keyObj.expires,
    unlocked: usedAt
  }));

  setTimeout(() => {
    document.getElementById('keyLoginScreen').style.display = 'none';
    showWelcomeScreen();
    setTimeout(() => { document.getElementById('toolkitApp').style.display = 'block'; }, 1100);
    initToolkit(keyObj);
  }, 1200);
}

  sessionStorage.removeItem('hina_session');
  document.getElementById('toolkitApp').style.display = 'none';

async function initToolkit(keyObj) {
  // ── Load tools ONLY from Firebase (admin controls everything) ──
  try {
    const snap = await get(ref(db, 'hina_tools'));
    if (snap.exists()) {
      tools = Object.values(snap.val()).filter(t => t && t.id);
    } else {
      tools = JSON.parse(JSON.stringify(DEFAULT_TOOLS));
    }
  } catch(e) {
    tools = JSON.parse(JSON.stringify(DEFAULT_TOOLS));
  }
  nextId = tools.reduce((m, t) => Math.max(m, t.id), 0) + 1;
  // Real-time listener — jab admin kuch add/delete kare toh toolkit mein foran update ho
  try {
    onValue(ref(db, 'hina_tools'), (snapshot) => {
      if (snapshot.exists()) {
        tools = Object.values(snapshot.val()).filter(t => t && t.id);
        nextId = tools.reduce((m, t) => Math.max(m, t.id), 0) + 1;
        renderAll();
      }
    });
  } catch(e) { console.warn('realtime listener error', e); }

  // ── Update header plan badge ──────────────────────────────
  const planBadgeEl = document.getElementById('userPlanBadge');
  if (planBadgeEl) planBadgeEl.textContent = getPlanLabel(keyObj.plan);

  // ── Expiry countdown ─────────────────────────────────────
  if (keyObj.plan !== 'full' && keyObj.expires) {
    const wrap = document.getElementById('liveCountdownWrap');
    if (wrap) {
      wrap.style.display = 'flex';
      function updCountdown() {
        const diff = new Date(keyObj.expires) - new Date();
        if (diff <= 0) { wrap.textContent = '⏰ Expired'; return; }
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        document.getElementById('cdDays').textContent = d;
        document.getElementById('cdHrs').textContent = h;
        document.getElementById('cdMins').textContent = m;
      }
      updCountdown();
      setInterval(updCountdown, 60000);
    }
  }

  // ── Load admin settings (colors, branding, notification) ──
  await loadAdminSettings();

  renderAll();

  // ── Show main tools area ──────────────────────────────────
  const mainTools = document.getElementById('mainTools');
  const toolGrid  = document.getElementById('toolGrid');
  const secLabel  = document.getElementById('sectionLabel');
  if (mainTools) mainTools.style.display = 'block';
  if (toolGrid)  toolGrid.style.display = 'grid';
  if (secLabel)  secLabel.style.display = 'flex';
}

// ══ ADMIN SETTINGS LOADER ════════════════════════════════════
async function loadAdminSettings() {
  try {
    const snap = await get(ref(db, 'hina_settings'));
    if (!snap.exists()) return;
    const s = snap.val();

    // BRANDING
    if (s.branding) {
      const n = s.branding.name;
      const sb = s.branding.sub;
      if (n) {
        const el1 = document.getElementById('klTitle');
        const el2 = document.getElementById('hdrTitle');
        if (el1) el1.textContent = n;
        if (el2) el2.textContent = n;
        document.title = n;
      }
      if (sb) {
        const el3 = document.getElementById('hdrSub');
        if (el3) el3.textContent = sb;
      }
    }

    // COLORS
    if (s.colors) {
      const c = s.colors;
      const r = document.documentElement;
      if (c.primary)    r.style.setProperty('--primary', c.primary);
      if (c.secondary)  r.style.setProperty('--secondary', c.secondary);
      if (c.accent)     r.style.setProperty('--accent', c.accent);
      if (c.bg) {
        r.style.setProperty('--bg', c.bg);
        // Auto adjust shadows based on bg darkness
        const isDark = (() => {
          try {
            const num = parseInt(c.bg.slice(1), 16);
            const rr=(num>>16)&255, gg=(num>>8)&255, bb=num&255;
            return (0.299*rr + 0.587*gg + 0.114*bb) < 128;
          } catch(e) { return false; }
        })();
        r.style.setProperty('--neu-shadow-dark', isDark ? '#1a1a1a' : '#a3b1c6');
        r.style.setProperty('--neu-shadow-light', isDark ? '#3a3a3a' : '#ffffff');
        r.style.setProperty('--text-dark', isDark ? '#f7fafc' : '#2d3748');
        r.style.setProperty('--text-light', isDark ? '#a0aec0' : '#718096');
        r.style.setProperty('--text', isDark ? '#e2e8f0' : '#4a5568');
      }
    }

    // NOTIFICATION
    if (s.notification && s.notification.active && s.notification.title) {
      const dismissed = sessionStorage.getItem('nb_dismissed');
      const ts = s.notification.timestamp || '';
      if (dismissed !== ts) {
        const banner = document.getElementById('notifBanner');
        if (banner) {
          const ni = document.getElementById('nbIcon');
          const nt = document.getElementById('nbTitle');
          const nm = document.getElementById('nbMsg');
          if (ni) ni.textContent = s.notification.icon || '🔔';
          if (nt) nt.textContent = s.notification.title;
          if (nm) nm.textContent = s.notification.message || '';
          banner.classList.add('show');
          window._nbTs = ts;
          // push header down
          const header = document.querySelector('.header');
          if (header) header.style.top = banner.offsetHeight + 'px';
        }
      }
    }
  } catch(e) { console.warn('loadAdminSettings:', e); }
}

function dismissNotif() {
  const banner = document.getElementById('notifBanner');
  if (banner) banner.classList.remove('show');
  const header = document.querySelector('.header');
  if (header) header.style.top = '0';
  if (window._nbTs) sessionStorage.setItem('nb_dismissed', window._nbTs);
}

function toggleProfileMenu() {

function filterTools(query) {
  renderAll();
}

function filterByCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderAll();
}

function renderAll() {
  const searchEl = document.getElementById('searchInput');
  const search = searchEl ? searchEl.value.toLowerCase() : '';
  const grid = document.getElementById('toolGrid');
  const label = document.getElementById('sectionLabel');
  const mainTools = document.getElementById('mainTools');

  if (mainTools) mainTools.style.display = 'block';
  if (grid) grid.style.display = 'grid';
  if (label) label.style.display = 'flex';

  if (!grid) return;

  let filtered = tools.filter(t => {
    const matchCat = currentCategory === 'all' || t.category === currentCategory;
    const matchSearch = !search || t.name.toLowerCase().includes(search) || (t.desc||'').toLowerCase().includes(search);
    return matchCat && matchSearch;
  });

  const pinned = filtered.filter(t => t.pinned);
  const rest   = filtered.filter(t => !t.pinned);
  const sorted = [...pinned, ...rest];

  const tc = document.getElementById('toolCount');
  if (tc) tc.textContent = tools.length;
  updateTabs();

  if (!sorted.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><div class="empty-text">No tools found...</div></div>`;
    if (label) label.textContent = 'No Results';
    return;
  }

  if (label) label.textContent = pinned.length ? 'Pinned & All Tools' : 'All Tools';
  grid.innerHTML = sorted.map(t => cardHTML(t)).join('');
}

function updateTabs() {
  const cats = ['all', ...new Set(tools.map(t => t.category))];
  const tabsEl = document.getElementById('categoryTabs');
  if (!tabsEl) return;
  tabsEl.innerHTML = cats.map(c => {
    const active = currentCategory === c ? 'active' : '';
    const label = c === 'all' ? '⚡ All' : c;
    return `<button class="cat-btn ${active}" onclick="filterByCategory('${c}', this)">${label}</button>`;
  }).join('');
}

function iconForCard(t) {
  if (t.icon && (t.icon.startsWith('http') || t.icon.startsWith('data:'))) {
    return `<img src="${t.icon}" style="width:100%;height:100%;object-fit:cover;border-radius:14px;" onerror="this.parentNode.textContent='🛠️'"/>`;
  }
  return t.icon || '🛠️';
}

function cardHTML(t) {
  const isExt = t.type === 'external' && t.url;
  const clickFn = isExt ? `openExtTool(${t.id})` : `openModal(${t.id})`;
  const extBadge = isExt ? `<div class="ext-badge">🔗 External</div>` : '';
  return `<div class="tool-card ${t.pinned ? 'pinned' : ''}" onclick="${clickFn}">
    <div class="tool-card-inner">
      <div class="tool-icon-wrap">${iconForCard(t)}</div>
      <div class="tool-info">
        <div class="tool-name">${t.name}${t.pinned ? '<span class="pin-badge">📌</span>' : ''}</div>
        <div class="tool-desc">${t.desc || ''}</div>
        <div class="tool-cat-badge">${t.category}</div>
        ${extBadge}
      </div>
    </div>
  </div>`;
}

// ══ MODAL ════════════════════════════════════════════════════
function openModal(id) {
  const t = tools.find(x => x.id === id);
  if (!t) return;
  const m = document.getElementById('toolModal');
  if (!m) return;
  document.getElementById('modalTitle').textContent = t.name;
  document.getElementById('modalDesc').textContent  = t.desc || '';
  const inp = document.getElementById('toolInput');
  if (inp) { inp.value = ''; inp.placeholder = t.placeholder || 'Enter input...'; }
  const out = document.getElementById('toolOutput');
  if (out) out.textContent = '';
  m.dataset.toolId = id;
  m.style.display = 'flex';
  setTimeout(() => m.classList.add('open'), 10);
}

function closeModal() {
  const m = document.getElementById('toolModal');
  if (!m) return;
  m.classList.remove('open');
  setTimeout(() => m.style.display = 'none', 300);
}

function runTool() {
  const m = document.getElementById('toolModal');
  const id = parseInt(m?.dataset.toolId);
  const t = tools.find(x => x.id === id);
  if (!t) return;
  const input = document.getElementById('toolInput')?.value || '';
  const out = document.getElementById('toolOutput');
  try {
    const fn = new Function('input', t.logic);
    const result = fn(input);
    if (out) out.textContent = result !== undefined ? String(result) : '(no output)';
  } catch(e) {
    if (out) out.textContent = '⚠️ Error: ' + e.message;
  }
}

function copyText() {
  const out = document.getElementById('toolOutput');
  if (!out || !out.textContent) return;
  navigator.clipboard.writeText(out.textContent).then(() => showToast('📋 Copied!'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ══ EXTERNAL TOOL IFRAME ════════════════════════════════════
function openExtTool(id) {
  const t = tools.find(x => x.id === id);
  if (!t || !t.url) return;
  const overlay = document.getElementById('extOverlay');
  const iframe  = document.getElementById('extIframe');
  const nameEl  = document.getElementById('extToolName');
  const loading = document.getElementById('extLoading');
  if (!overlay || !iframe) return;
  nameEl.textContent = t.name;
  loading.style.display = 'flex';
  iframe.src = '';
  overlay.classList.add('open');
  // slight delay so overlay renders first
  setTimeout(() => { iframe.src = t.url; }, 100);
  window._extUrl = t.url;
}

function closeExtTool() {
  const overlay = document.getElementById('extOverlay');
  const iframe  = document.getElementById('extIframe');
  if (overlay) overlay.classList.remove('open');
  if (iframe)  iframe.src = '';
}

function openExtNewTab() {
  if (window._extUrl) window.open(window._extUrl, '_blank');
}
